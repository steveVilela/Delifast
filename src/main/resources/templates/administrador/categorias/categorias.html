<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: header_head}"></head>

<body style="background-color:#f4f6f9;">
    <nav th:replace="~{layout/plantilla :: nav_bar}"></nav>
     <div class="container-fluid" style="margin-top: 120px; margin-bottom: 40px;">
        <div class="row g-4">

            <div class="col-lg-4">
                <form th:action="@{/administrador/categorias/guardar}" th:object="${categoria}" 
                      method="post" enctype="multipart/form-data"
                      style="background:#f0f7ff;padding:25px;border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.08)">

                    <input type="hidden" th:field="*{categoriaId}">

                    <h4 class="text-center mb-4" th:classappend="'text-' + ${color != null ? color : 'success'}" 
                        th:text="${titulo != null ? titulo : 'Nueva Categoría'}">
                    </h4>

                    <div class="mb-3">
                        <label class="form-label">Nombre de la categoría</label>
                        <input type="text" th:field="*{nombre}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Imagen de Especialidad</label>
                        <input type="file" name="fileImagen" class="form-control" accept="image/*">
                    </div>

                    <div class="d-grid">
                        <button class="btn" th:classappend="'btn-' + ${color != null ? color : 'success'}"
                                th:text="${boton != null ? boton : 'GUARDAR'}">
                        </button>
                    </div>
                </form>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm p-3"
				style="background:#f0f7ff;padding:25px;border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.08)">

                    <h5 class="mb-3">Listado de Categorías</h5>

                    <table class="table table-bordered table-striped align-middle"
					style="background:#f0f7ff;padding:25px;border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.08)">

                        <thead class="table-light text-center">
                            <tr>
                                <th>ID</th>
                                <th>IMAGEN</th>
                                <th>NOMBRE</th>
                                <th>ACCIÓN</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat : ${categorias}">
                                <td class="text-center" th:text="${cat.categoriaId}"></td>
                                <td class="text-center">
                                    <img th:src="${cat.imagen != null} ? @{'/uploads/categorias/' + ${cat.imagen}} : @{/img/no-image.png}" 
                                         style="width:50px; height:50px; object-fit:cover; border-radius:5px;">
                                </td>
                                <td th:text="${cat.nombre}"></td>
                                <td class="text-center">
                                    <a th:href="@{/administrador/categorias/editar/{id}(id=${cat.categoriaId})}"
                                       class="btn btn-sm btn-outline-primary">✏️</a>
                                    
                                    <button type="button" class="btn btn-sm btn-outline-danger"
                                            th:onclick="'eliminarCategoria(' + ${cat.categoriaId} + ')'">🗑️</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script th:inline="javascript">
        function eliminarCategoria(id) {
            Swal.fire({
                title: '¿Estás seguro?',
                text: "¡No podrás revertir esto!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/administrador/categorias/eliminar/' + id;
                }
            });
        }

        document.addEventListener("DOMContentLoaded", function () {
            /* Reading flash attributes safely with Thymeleaf inline */
            const msj = '[[${msj}]]';
            
            if (msj === "error_fk") {
                Swal.fire({
                    icon: 'warning',
                    title: 'No se puede eliminar la categoría',
                    text: 'Esta categoría tiene productos asociados en el menú.',
                    confirmButtonText: 'Entendido',
                    confirmButtonColor: '#3085d6'
                });
            } else if (msj === "create") {
                Swal.fire({ icon: 'success', title: '¡Creado!', text: 'Categoría registrada con éxito.' });
            } else if (msj === "update") {
                Swal.fire({ icon: 'success', title: '¡Actualizado!', text: 'Categoría modificada con éxito.' });
            } else if (msj === "delete") {
                Swal.fire({ icon: 'success', title: '¡Eliminado!', text: 'Categoría removida del sistema.' });
            }
        });
    </script>
    
    <footer th:replace="~{layout/plantilla :: footer_layout}"></footer>
</body>
</html>
