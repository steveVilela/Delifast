<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: header_head}"></head>

<body style="background-color:#f4f6f9;">
    <div th:replace="~{layout/plantilla :: nav_bar}"></div>

    <div class="container-fluid" 
	style="margin-top: 120px; margin-bottom: 40px;">
        <div class="row g-4">

            <div class="col-lg-4">
                <form th:action="@{/administrador/clientes/guardar}" th:object="${cliente}" 
                      method="post"
                      
					  style="background:#f0f7ff;padding:25px;border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.08)">

                    <input type="hidden" th:field="*{clienteId}">

                    <h4 class="text-center mb-4 fw-bold" th:classappend="'text-' + ${color != null ? color : 'success'}" 
                        th:text="${titulo != null ? titulo : 'Nuevo Cliente'}">
                    </h4>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre Completo</label>
                        <input type="text" th:field="*{nombreCompleto}" class="form-control" placeholder="Ej. Juan Pérez López" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">DNI</label>
                        <input type="text" th:field="*{dni}" class="form-control" placeholder="8 dígitos" maxlength="8" minlength="8" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Teléfono</label>
                        <input type="tel" th:field="*{telefono}" class="form-control" placeholder="Ej. 987654321" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Correo Electrónico</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="nombre@correo.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Dirección de Entrega</label>
                        <input type="text" th:field="*{direccion}" class="form-control" placeholder="Av. Los Próceres 123" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button class="btn fw-bold py-2" th:classappend="'btn-' + ${color != null ? color : 'success'}"
                                th:text="${boton != null ? boton : 'REGISTRAR'}">
                        </button>
                    </div>
                </form>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm border-0 p-3"
				style="background:#f0f7ff;padding:25px;border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.08)">

                    <h5 class="mb-3 fw-bold text-secondary">Listado de Clientes Registrados</h5>

                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle mb-0">
                            <thead class="table-light text-center">
                                <tr>
                                    <th style="width: 60px;">ID</th>
                                    <th>NOMBRE</th>
                                    <th style="width: 100px;">DNI</th>
                                    <th>TELÉFONO</th>
                                    <th>EMAIL</th>
                                    <th>DIRECCIÓN</th>
                                    <th style="width: 110px;">ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cli : ${clientes}">
                                    <td class="text-center fw-bold th-sm" th:text="${cli.clienteId}"></td>
                                    <td th:text="${cli.nombreCompleto}"></td>
                                    <td class="text-center" th:text="${cli.dni}"></td>
                                    <td th:text="${cli.telefono}"></td>
                                    <td th:text="${cli.email}"></td>
                                    <td th:text="${cli.direccion}"></td>
                                    <td class="text-center">
                                        <div class="btn-group btn-group-sm">
                                            <a th:href="@{/administrador/clientes/editar/{id}(id=${cli.clienteId})}"
                                               class="btn btn-outline-primary" title="Editar">✏️</a>
                                            
                                            <button type="button" class="btn btn-outline-danger" title="Eliminar"
                                                    th:data-id="${cli.clienteId}"
                                                    onclick="eliminarCliente(this.getAttribute('data-id'))">🗑️</button>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(clientes)}">
                                    <td colspan="7" class="text-center text-muted py-4">No hay clientes registrados en el sistema.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div th:replace="~{layout/plantilla :: footer_layout}"></div>

    <script th:inline="javascript">
        // Función para confirmar la eliminación física
        function eliminarCliente(id) {
            Swal.fire({
                title: '¿Eliminar cliente?',
                text: "Esta acción quitará al cliente de la base de datos.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/administrador/clientes/eliminar/' + id;
                }
            });
        }

        // Escuchador para los mensajes flash enviados desde el ClienteController
        document.addEventListener("DOMContentLoaded", function () {
            const msj = '[[${msj}]]';
            
            if (msj === "error_fk") {
                Swal.fire({
                    icon: 'warning',
                    title: 'No se puede eliminar',
                    text: 'Este cliente ya cuenta con historial de pedidos registrados.',
                    confirmButtonText: 'Entendido',
                    confirmButtonColor: '#3085d6'
                });
            } else if (msj === "create") {
                Swal.fire({ icon: 'success', title: '¡Registrado!', text: 'Cliente agregado correctamente.' });
            } else if (msj === "update") {
                Swal.fire({ icon: 'success', title: '¡Actualizado!', text: 'Datos del cliente modificados con éxito.' });
            } else if (msj === "delete") {
                Swal.fire({ icon: 'success', title: '¡Eliminado!', text: 'El registro del cliente fue removido.' });
            } else if (msj === "error") {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Ocurrió un problema interno en el proceso.' });
            }
        });
    </script>
</body>
</html>
