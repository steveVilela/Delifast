<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: header_head}"></head>

<body style="background-color:#f4f6f9;">
    <div th:replace="~{layout/plantilla :: nav_bar}"></div>

    <div class="container-fluid" style="margin-top: 120px; margin-bottom: 40px;">
	
        <div class="card shadow-sm border-0 p-4" 
		style="background:#f0f7ff;padding:25px;border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.08)">

            <h4 class="mb-4 fw-bold text-secondary">🍕 Panel General de Pedidos (DeliFast)</h4>
            
            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-dark text-center">
                        <tr>
                            <th style="width: 80px;">PEDIDO ID</th>
                            <th style="width: 150px;">FECHA Y HORA</th> <th>CLIENTE</th>
                            <th>DIRECCIÓN DE ENTREGA</th>
                            <th>MÉTODO DE PAGO</th>
                            <th style="width: 130px;">TOTAL</th>
                            <th style="width: 140px;">ESTADO</th>
                            <th style="width: 220px;">ACCIONES</th> </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ped : ${pedidos}">
                            <td class="text-center fw-bold text-primary font-monospace" th:text="${ped.pedidoId}"></td>
                            
                            <td class="text-center text-muted font-monospace small" 
                                th:text="${ped.fechaPedido != null ? #temporals.format(ped.fechaPedido, 'dd/MM/yyyy HH:mm') : '-------'}">
                                21/06/2026 01:45
                            </td>

                            <td th:text="${ped.cliente.nombreCompleto}"></td>
                            <td th:text="${ped.direccionEntrega}"></td>
                            <td class="text-center small" th:text="${ped.metodoPago}"></td>
                            <td class="fw-bold text-end text-success font-monospace" th:text="'S/ ' + ${#numbers.formatDecimal(ped.total, 1, 2)}"></td>
                            <td class="text-center">
                                <span th:if="${ped.estado == 'Pendiente'}" class="badge bg-warning text-dark px-3 py-2">⏳ Pendiente</span>
                                <span th:if="${ped.estado == 'Preparando'}" class="badge bg-info text-white px-3 py-2">👨‍🍳 Preparando</span>
                                <span th:if="${ped.estado == 'Entregado'}" class="badge bg-success text-white px-3 py-2">✅ Entregado</span>
                                <span th:if="${ped.estado == 'Cancelado'}" class="badge bg-danger text-white px-3 py-2">❌ Cancelado</span>
                                <span th:if="${#strings.isEmpty(ped.estado)}" class="badge bg-secondary text-white px-3 py-2">❓ Sin Estado</span>
                            </td>
                            <td>
                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-sm btn-outline-primary" title="Ver Detalle"
                                            th:data-id="${ped.pedidoId}"
                                            onclick="cargarDetallePedido(this.getAttribute('data-id'))">
                                        👁️
                                    </button>

                                    <form th:action="@{/administrador/pedidos/cambiar-estado}" method="post" class="d-flex gap-1 flex-grow-1">
                                        <input type="hidden" name="id" th:value="${ped.pedidoId}">
                                        <select name="estado" class="form-select form-select-sm" onchange="this.form.submit()">
                                            <option value="Pendiente" th:selected="${ped.estado == 'Pendiente'}">Pendiente</option>
                                            <option value="Preparando" th:selected="${ped.estado == 'Preparando'}">Preparando</option>
                                            <option value="Entregado" th:selected="${ped.estado == 'Entregado'}">Entregado</option>
                                            <option value="Cancelado" th:selected="${ped.estado == 'Cancelado'}">Cancelado</option>
                                        </select>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pedidos)}">
                            <td colspan="8" class="text-center text-muted py-4">No se registran órdenes de compra en el sistema.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="detalleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" id="contenedorModalDinamico">
                </div>
        </div>
    </div>

    <div th:replace="~{layout/plantilla :: footer_layout}"></div>

    <script th:inline="javascript">
        function cargarDetallePedido(id) {
            fetch('/administrador/pedidos/detalle/' + id)
                .then(response => response.text())
                .then(html => {
                    document.getElementById('contenedorModalDinamico').innerHTML = html;
                    var miModal = new bootstrap.Modal(document.getElementById('detalleModal'));
                    miModal.show();
                })
                .catch(error => {
                    console.error('Error al cargar el detalle:', error);
                    Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo cargar la información del pedido.' });
                });
        }

        document.addEventListener("DOMContentLoaded", function () {
            const msj = '[[${msj}]]';
            if (msj === "estado_ok") {
                Swal.fire({ icon: 'success', title: 'Estado Actualizado', text: 'El estado del pedido cambió correctamente.', confirmButtonColor: '#3085d6'});
            } else if (msj === "error") {
                Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo actualizar el estado.' });
            }
        });
    </script>
</body>
</html>
