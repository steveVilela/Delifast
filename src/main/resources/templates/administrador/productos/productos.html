<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/plantilla :: header_head}"></th:block>
</head>
<body style="background-color:#f4f6f9;">

    <nav th:replace="~{layout/plantilla :: nav_bar}"></nav>

    <div class="container-fluid" style="margin-top: 120px; margin-bottom: 40px;">
        
        <div class="row mb-3" th:if="${producto.productoId > 0}">
            <div class="col-12 text-end">
                <a th:href="@{/administrador/productos}" class="btn btn-primary fw-bold shadow-sm">
                    ➕ REGRESAR A NUEVO PRODUCTO
                </a>
            </div>
        </div>

        <div class="row g-4">
            
            <div class="col-lg-4">
                <form th:action="@{/administrador/productos/guardar}" 
                      th:object="${producto}" 
                      method="post" 
                      enctype="multipart/form-data"
                      style="background:#f0f7ff; padding:25px; border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.08)">

                    <input type="hidden" th:field="*{productoId}" />
                    <input type="hidden" name="imagenActual" th:value="*{imagen}" />
                    <input type="hidden" th:field="*{stock}" />

                    <h4 class="text-center mb-4 text-success fw-bold" 
                        th:text="${producto.productoId > 0} ? '✏️ Editar Producto' : '➕ Nuevo Producto'">
                    </h4>
                    <hr>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Categoría</label>
                        <select th:field="*{categoriaId}" class="form-select" required>
                            <option value="0">Seleccione...</option>
                            <option th:each="cat : ${categorias}" 
                                    th:value="${cat.categoriaId}" 
                                    th:text="${cat.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Nombre del Producto</label>
                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej. Hamburguesa Royal" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Precio (S/)</label>
                        <input type="number" step="0.01" th:field="*{precio}" class="form-control" placeholder="0.00" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Imagen del Producto</label>
                        <input type="file" name="fileImagen" class="form-control" accept="image/*" />
                        <div class="form-text text-muted small mt-1" th:if="${producto.productoId > 0}">
                            🖼️ Actual: <span class="fw-bold" th:text="*{imagen}"></span>
                        </div>
                    </div>

                    <div class="mb-3 form-check form-switch p-3 border rounded bg-white shadow-sm" th:if="${producto.productoId == 0}">
                        <input type="checkbox" name="esReventa" value="true" class="form-check-input ms-0 me-2" id="checkReventa" />
                        <label class="form-check-label fw-bold text-primary" for="checkReventa">
                            📦 ¿Es un producto de reventa directa?
                        </label>
                        <div class="form-text text-muted small lh-sm mt-1">
                            Marcar solo para Gaseosas, Helados o Bebidas. El sistema creará en cadena su insumo en el almacén y su receta 1 a 1 de forma automática.
                        </div>
                    </div>

                    <div class="mb-4 form-check form-switch">
                        <input type="checkbox" th:checked="*{estaActivo}" name="estaActivo" class="form-check-input" id="checkActivo" />
                        <label class="form-check-label fw-bold text-secondary" for="checkActivo">Habilitar para la venta (Activo)</label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success fw-bold">GUARDAR</button>
                    </div>

                </form>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm p-3" 
                     style="background:#f0f7ff; padding:25px; border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.08)">
                    
                    <h5 class="mb-3 fw-bold text-secondary">🍔 Listado de Productos en Carta</h5>
                    
                    <div class="table-responsive">
                        <table class="table table-bordered table-striped align-middle mb-0" style="background:#f0f7ff;">
                            <thead class="table-light text-center">
                                <tr>
                                    <th style="width: 80px;">IMAGEN</th>
                                    <th>NOMBRE</th>
                                    <th style="width: 120px;">PRECIO</th>
                                    <th style="width: 110px;">ACTIVO</th>
                                    <th style="width: 110px;">ACCIÓN</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${productos}">
                                    <td class="text-center">
                                        <img th:src="${p.imagen != null} ? @{'/uploads/productos/' + ${p.imagen}} : @{/img/no-image.png}" 
                                             style="width:50px; height:50px; object-fit:cover; border-radius:5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);" />
                                    </td>
                                    <td class="fw-bold text-dark" th:text="${p.nombre}"></td>
                                    <td class="text-end fw-bold text-primary" th:text="'S/ ' + ${#numbers.formatDecimal(p.precio, 1, 2)}"></td>
                                    
                                    <td class="text-center">
                                        <span th:class="${p.estaActivo} ? 'badge bg-success px-2 py-2' : 'badge bg-danger px-2 py-2'"
                                              th:text="${p.estaActivo} ? '🟢 Sí' : '🔴 No'">
                                        </span>
                                    </td>
                                    <td class="text-center">
                                        <div class="d-flex justify-content-center gap-2">
                                            <a th:href="@{/administrador/productos/editar/{id}(id=${p.productoId})}" 
                                               class="btn btn-sm btn-outline-primary" title="Editar">✏️</a>
                                            
                                               <button type="button" class="btn btn-sm btn-outline-danger btn-eliminar-prod" title="Eliminar"
                                                       th:data-id="${p.productoId}" 
                                                       th:data-nombre="${p.nombre}">
                                                   🗑️
                                               </button>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(productos)}">
                                    <td colspan="5" class="text-center text-muted py-4">No se encontraron productos registrados.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            
            document.addEventListener("click", function (event) {
                const boton = event.target.closest(".btn-eliminar-prod");
                if (boton) {
                    const id = boton.getAttribute("data-id");
                    const nombre = boton.getAttribute("data-nombre");
                    ejecutarAlertaEliminar(id, nombre);
                }
            });

            const msj = '[[${msj}]]';
            if (msj === "error_fk") {
                Swal.fire({
                    icon: 'error',
                    title: 'No se puede eliminar',
                    text: 'Este producto tiene transacciones, comandas o registros vinculados en el historial.',
                    confirmButtonColor: '#3085d6'
                });
            } else if (msj === "create") {
                Swal.fire({ icon: 'success', title: '¡Creado!', text: 'Producto registrado con éxito.' });
            } else if (msj === "update") {
                Swal.fire({ icon: 'success', title: '¡Actualizado!', text: 'Producto modificado con éxito.' });
            } else if (msj === "delete") {
                Swal.fire({ icon: 'success', title: '¡Eliminado!', text: 'Producto removido del sistema.' });
            }
        });

        function ejecutarAlertaEliminar(id, nombre) {
            Swal.fire({
                title: '¿Eliminar producto?',
                html: `¿Está seguro de remover <b>"${nombre}"</b> de la carta?<br><small class="text-muted">Esta acción no se puede deshacer.</small>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = '/administrador/productos/eliminar/' + id;
                }
            });
        }
    </script>

    <div th:replace="~{layout/plantilla :: footer_layout}"></div>

</body>
</html>
