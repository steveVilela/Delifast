<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/plantilla :: header_head}"></th:block>
</head>
<body>

    <div th:replace="~{layout/plantilla :: nav_bar}"></div>

    <div class="container my-5" style="max-width:460px;">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <h1 class="h4 mb-3">Acceso al Panel</h1>
                
                <div th:if="${error != null}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/administrador/login}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="admin@delifast.local" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="********" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Aceptar</button>
                    </div>

                </form>

            </div>
        </div>

        <div class="text-center mt-3">
            <a th:href="@{/menu}" class="link-secondary">Volver al menú</a>
        </div>
    </div>

    <div th:replace="~{layout/plantilla :: footer_layout}"></div>

</body>
</html>
