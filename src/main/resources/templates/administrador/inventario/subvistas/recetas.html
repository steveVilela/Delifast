<div xmlns:th="http://www.thymeleaf.org" th:fragment="cuerpo">
    
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
        <h4 class="mb-0 text-dark fw-bold">⚙️ Gestión de Recetas / Fórmulas</h4>
        <span class="badge bg-purple text-white px-3 py-2" style="background-color: #6f42c1;">Explosión de Insumos</span>
    </div>

    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm border-0 p-3 bg-white h-100">
                <h5 class="fw-bold text-secondary mb-3 fs-6">Asignar Insumo a Plato</h5>
                
                <form th:action="@{/administrador/inventario/recetas/guardar}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Producto / Plato de Venta:</label>
                        <select name="productoId" class="form-select form-select-sm" required>
                            <option value="" disabled selected>-- Seleccione un plato --</option>
                            <option th:each="p : ${productos}" 
                                    th:value="${p.productoId}" 
                                    th:text="${p.nombre}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Insumo Requerido:</label>
                        <select name="insumoId" class="form-select form-select-sm" required>
                            <option value="" disabled selected>-- Seleccione un insumo --</option>
                            <option th:each="i : ${insumos}" 
                                    th:value="${i.insumoId}" 
                                    th:text="${i.nombre} + ' (' + ${i.unidadMedida} + ')'"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Cantidad de Porción:</label>
                        <input type="number" name="cantidadNecesaria" class="form-control form-control-sm" 
                               placeholder="Ej: 150 para gramos, 1 para unidad" min="1" required />
                        <div class="form-text xsmall text-muted">Especifique la cantidad exacta para la preparación.</div>
                    </div>

                    <button type="submit" class="btn btn-sm text-white w-100 fw-bold" style="background-color: #6f42c1;">
                        🔗 Vincular Componente
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm border-0 p-3 bg-white h-100">
                <h5 class="fw-bold text-secondary mb-3 fs-6">Componentes Registrados</h5>
                
                <div class="table-responsive" style="max-height: 350px; overflow-y: auto;">
                    <table class="table table-sm table-striped table-hover align-middle mb-0">
                        <thead class="table-dark small">
                            <tr>
                                <th>Plato (Venta)</th>
                                <th>Insumo Componente</th>
                                <th class="text-center">Porción</th>
                            </tr>
                        </thead>
                        <tbody class="small">
                            <tr th:each="r : ${recetas}">
                                <td class="fw-bold text-dark" th:text="${r.producto.nombre}">Hamburguesa</td>
                                <td class="text-secondary" th:text="${r.insumo.nombre}">Pan</td>
                                <td class="text-center font-monospacefw-bold text-primary">
                                    <span th:text="${r.cantidadNecesaria}">0</span> 
                                    <span class="text-muted" th:text="${r.insumo.unidadMedida}">gr</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(recetas)}">
                                <td colspan="3" class="text-center text-muted py-4">
                                    No hay fórmulas o recetas registradas en el sistema.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
