<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{layout/plantilla :: header_head}"></th:block>
</head>

<body>


<div th:replace="~{layout/plantilla :: nav_bar}"></div>


<section class="home-hero">
    <div class="container" style="margin-top:110px;">

        <div class="row align-items-center">

            <div class="col-lg-6">

                <span class="badge bg-danger mb-3">
                    📍 Contáctanos
                </span>

                <h1 class="display-4 fw-bold mb-3">
                    Estamos para <span class="brand-title">ayudarte</span>
                </h1>

                <p class="lead text-muted">
                    Visítanos o escríbenos. Te responderemos lo más rápido posible.
                </p>

                <p class="text-muted">
                    🍔 DeliFast - comida rápida con el mejor sabor.
                </p>

            </div>

            <div class="col-lg-6 text-center">
                <img th:src="@{/img/home-portada.png}"
                     class="img-fluid home-hero__image"
                     alt="Contacto DeliFast">
            </div>

        </div>

    </div>
</section>


<section class="py-5 bg-light">

    <div class="container">

        <div class="row">

            
            <div class="col-md-6 mb-4">

                <div class="servicio-card h-100">

                    <h3 class="text-center mb-3"> Nuestra Ubicación</h3>

                    <div class="ratio ratio-16x9">

						<iframe 
						  src="https://www.google.com/maps?q=-13.171914,-74.210006&z=18&output=embed"
						  width="100%" 
						  height="100%" 
						  style="border:0;" 
						  loading="lazy"
						  allowfullscreen>
						</iframe>

                    </div>

                </div>

            </div>

            
            <div class="col-md-6 mb-4">

                <div class="servicio-card h-100">

                    <h3 class="text-center mb-3"> Envíanos un mensaje</h3>

                    <form>

                        <input type="text" class="form-control mb-3" placeholder="Nombre completo">

                        <input type="email" class="form-control mb-3" placeholder="Correo electrónico">

                        <textarea class="form-control mb-3" rows="6" placeholder="Escribe tu mensaje"></textarea>

                        <button type="submit" class="btn btn-accent w-100">
                            Enviar mensaje
                        </button>

                    </form>

                </div>

            </div>

        </div>

   
        <div class="row mt-4">

            <div class="col-md-4">
                <div class="servicio-card text-center">
                    <i class="bi bi-geo-alt-fill fs-3 text-danger"></i>
                    <h5 class="mt-2">Dirección</h5>
                    <p>Av. América Cazón 1478, Ayacucho</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="servicio-card text-center">
                    <i class="bi bi-telephone-fill fs-3 text-danger"></i>
                    <h5 class="mt-2">Teléfono</h5>
                    <p>+51 981 731 695</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="servicio-card text-center">
                    <i class="bi bi-envelope-fill fs-3 text-danger"></i>
                    <h5 class="mt-2">Email</h5>
                    <p>delifast@gmail.com</p>
                </div>
            </div>

        </div>

    </div>

</section>

<div th:replace="~{layout/plantilla :: footer_layout}"></div>

</body>
</html>
